<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 180" width="720" height="180" role="img" aria-label="Scenario Engine flow: prompt to validation to Revit with rollback">
  <defs>
    <radialGradient id="sglow-cyan" cx="15%" cy="50%" r="55%">
      <stop offset="0%" stop-color="rgba(6,182,212,0.18)"/>
      <stop offset="55%" stop-color="rgba(6,182,212,0)"/>
    </radialGradient>
    <radialGradient id="sglow-magenta" cx="85%" cy="35%" r="55%">
      <stop offset="0%" stop-color="rgba(236,72,153,0.14)"/>
      <stop offset="55%" stop-color="rgba(236,72,153,0)"/>
    </radialGradient>

    <style>
      @keyframes flowDash { to { stroke-dashoffset: -18; } }
      @keyframes nodeIn {
        from { opacity: 0; transform: translateY(4px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes pulse {
        0%, 100% { stroke-opacity: 0.35; }
        50%      { stroke-opacity: 0.75; }
      }
      @keyframes rollbackIn {
        from { opacity: 0; stroke-dasharray: 0 120; }
        to   { opacity: 1; stroke-dasharray: 6 6; }
      }
      .node { animation: nodeIn 0.45s ease-out both; }
      .n1 { animation-delay: 0.00s; }
      .n2 { animation-delay: 0.10s; }
      .n3 { animation-delay: 0.20s; }
      .n4 { animation-delay: 0.30s; }
      .n5 { animation-delay: 0.40s; }
      .node rect { animation: pulse 3.2s ease-in-out infinite; }
      .n1 rect { animation-delay: 0.00s; }
      .n2 rect { animation-delay: 0.65s; }
      .n3 rect { animation-delay: 1.30s; }
      .n4 rect { animation-delay: 1.95s; }
      .n5 rect { animation-delay: 2.60s; }
      .flow { stroke-dasharray: 6 6; animation: flowDash 1.1s linear infinite; }
      .rollback { animation: rollbackIn 0.6s ease-out 0.7s both, flowDash 1.6s linear 0.7s infinite; }
    </style>
  </defs>

  <rect width="720" height="180" rx="6" fill="#050505"/>
  <rect width="720" height="180" rx="6" fill="url(#sglow-cyan)"/>
  <rect width="720" height="180" rx="6" fill="url(#sglow-magenta)"/>

  <!-- Caption top -->
  <text x="24" y="26" font-family="JetBrains Mono, Consolas, monospace" font-size="10" letter-spacing="2.5" fill="#06b6d4">/ SCENARIO ENGINE</text>
  <text x="24" y="44" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#fafafa">Versioned DAG of LLM + tool nodes &#8594; validation &#8594; Revit</text>

  <!-- Flow edges forward -->
  <g class="flow" stroke="#06b6d4" stroke-opacity="0.45" stroke-width="1.4" fill="none">
    <line x1="124" y1="108" x2="166" y2="108"/>
    <line x1="268" y1="108" x2="310" y2="108"/>
    <line x1="412" y1="108" x2="454" y2="108"/>
    <line x1="556" y1="108" x2="598" y2="108"/>
  </g>

  <!-- Rollback edge: curved, goes from end back to step 2 -->
  <path class="rollback" d="M 646 98 C 630 48, 210 48, 226 88" stroke="#ec4899" stroke-opacity="0.85" stroke-width="1.3" fill="none"/>
  <text x="430" y="60" font-family="JetBrains Mono, Consolas, monospace" font-size="9" fill="#ec4899" letter-spacing="1.5">rollback / version diff</text>

  <!-- Node 1: Prompt -->
  <g class="node n1">
    <rect x="14" y="82" width="110" height="52" rx="6" fill="#0f0f10" stroke="#06b6d4" stroke-opacity="0.35" stroke-width="1.2"/>
    <text x="69" y="108" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#fafafa">Prompt</text>
    <text x="69" y="124" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="rgba(255,255,255,0.55)">user intent</text>
  </g>

  <!-- Node 2: LLM node -->
  <g class="node n2">
    <rect x="166" y="82" width="102" height="52" rx="6" fill="#0f0f10" stroke="#06b6d4" stroke-opacity="0.35" stroke-width="1.2"/>
    <text x="217" y="108" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#fafafa">LLM node</text>
    <text x="217" y="124" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="rgba(255,255,255,0.55)">Qwen &#183; vLLM</text>
  </g>

  <!-- Node 3: Tool node -->
  <g class="node n3">
    <rect x="310" y="82" width="102" height="52" rx="6" fill="#0f0f10" stroke="#06b6d4" stroke-opacity="0.35" stroke-width="1.2"/>
    <text x="361" y="108" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#fafafa">Tool node</text>
    <text x="361" y="124" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="rgba(255,255,255,0.55)">MCP / Revit</text>
  </g>

  <!-- Node 4: Validation -->
  <g class="node n4">
    <rect x="454" y="82" width="102" height="52" rx="6" fill="#0f0f10" stroke="#06b6d4" stroke-opacity="0.35" stroke-width="1.2"/>
    <text x="505" y="108" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#fafafa">Validation</text>
    <text x="505" y="124" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="rgba(255,255,255,0.55)">IDS &#183; Clash</text>
  </g>

  <!-- Node 5: Publish / BIM -->
  <g class="node n5">
    <rect x="598" y="82" width="108" height="52" rx="6" fill="#0f0f10" stroke="#f59e0b" stroke-opacity="0.55" stroke-width="1.2"/>
    <text x="652" y="108" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#f59e0b">Publish</text>
    <text x="652" y="124" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="rgba(255,255,255,0.55)">BIM model</text>
  </g>

  <!-- Footer mono caption -->
  <text x="360" y="166" text-anchor="middle" font-family="JetBrains Mono, Consolas, monospace" font-size="9" fill="rgba(255,255,255,0.45)" letter-spacing="1.5">replaces prior multi-agent runtime &#183; versioned, rollbackable</text>
</svg>
