<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" width="1600" height="400" role="img" aria-label="Daniil Kiselyov, Lead ML Engineer, kiselyov.dev banner">
  <defs>
    <radialGradient id="glow-cyan" cx="18%" cy="55%" r="55%">
      <stop offset="0%" stop-color="rgba(6,182,212,0.32)"/>
      <stop offset="48%" stop-color="rgba(6,182,212,0)"/>
    </radialGradient>
    <radialGradient id="glow-magenta" cx="82%" cy="35%" r="55%">
      <stop offset="0%" stop-color="rgba(236,72,153,0.28)"/>
      <stop offset="48%" stop-color="rgba(236,72,153,0)"/>
    </radialGradient>
    <radialGradient id="glow-amber" cx="70%" cy="85%" r="50%">
      <stop offset="0%" stop-color="rgba(245,158,11,0.22)"/>
      <stop offset="42%" stop-color="rgba(245,158,11,0)"/>
    </radialGradient>
    <pattern id="vgrid" width="44" height="400" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="400" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="400" fill="#050505"/>
  <rect width="1600" height="400" fill="url(#glow-cyan)"/>
  <rect width="1600" height="400" fill="url(#glow-magenta)"/>
  <rect width="1600" height="400" fill="url(#glow-amber)"/>
  <rect width="1600" height="400" fill="url(#vgrid)"/>

  <!-- Amber mono tag -->
  <text x="80" y="118" font-family="JetBrains Mono, Consolas, monospace" font-size="16" letter-spacing="3.5" fill="#f59e0b">LEAD ML ENGINEER &#183; MOSCOW / REMOTE</text>

  <!-- Headline -->
  <text x="80" y="200" font-family="Inter, -apple-system, Segoe UI, sans-serif" font-size="72" font-weight="800" fill="#fafafa" letter-spacing="-1.8">LLM systems that <tspan fill="#06b6d4">ship</tspan> to production.</text>

  <!-- Mono role line -->
  <text x="80" y="238" font-family="JetBrains Mono, Consolas, monospace" font-size="18" fill="rgba(255,255,255,0.72)">on-prem &#183; air-gapped &#183; multimodal</text>

  <!-- Fact chips row -->
  <g font-family="JetBrains Mono, Consolas, monospace">
    <g transform="translate(80, 280)">
      <rect width="170" height="58" rx="6" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
      <text x="14" y="28" font-size="22" font-weight="700" fill="#06b6d4">5.5y</text>
      <text x="14" y="46" font-size="11" fill="rgba(255,255,255,0.72)">in ML &amp; dev</text>
    </g>
    <g transform="translate(262, 280)">
      <rect width="230" height="58" rx="6" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
      <text x="14" y="28" font-size="22" font-weight="700" fill="#06b6d4">4</text>
      <text x="14" y="46" font-size="11" fill="rgba(255,255,255,0.72)">enterprise AI systems</text>
    </g>
    <g transform="translate(504, 280)">
      <rect width="190" height="58" rx="6" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
      <text x="14" y="28" font-size="22" font-weight="700" fill="#06b6d4">10+</text>
      <text x="14" y="46" font-size="11" fill="rgba(255,255,255,0.72)">presales led</text>
    </g>
    <g transform="translate(706, 280)">
      <rect width="220" height="58" rx="6" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
      <text x="14" y="28" font-size="22" font-weight="700" fill="#06b6d4">5</text>
      <text x="14" y="46" font-size="11" fill="rgba(255,255,255,0.72)">open-source ML repos</text>
    </g>
  </g>

  <!-- Bottom chip: left kiselyov.dev, right github handle -->
  <g font-family="JetBrains Mono, Consolas, monospace" font-size="14">
    <text x="80" y="372" fill="#06b6d4" letter-spacing="2">kiselyov.dev</text>
    <text x="1520" y="372" fill="rgba(255,255,255,0.45)" text-anchor="end">github.com/kiselyovd</text>
  </g>
</svg>
