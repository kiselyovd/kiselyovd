<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" width="1600" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="400" fill="url(#bg)"/>

  <!-- Decorative grid -->
  <g stroke="#334155" stroke-width="0.6" opacity="0.35">
    <path d="M 0 100 L 1600 100"/>
    <path d="M 0 200 L 1600 200"/>
    <path d="M 0 300 L 1600 300"/>
    <path d="M 400 0 L 400 400"/>
    <path d="M 800 0 L 800 400"/>
    <path d="M 1200 0 L 1200 400"/>
  </g>

  <!-- Accent bar -->
  <rect x="80" y="96" width="72" height="6" rx="3" fill="url(#accent)"/>

  <!-- Main name -->
  <text x="80" y="200" font-family="Inter, -apple-system, Segoe UI, sans-serif" font-size="88" font-weight="800" fill="#f8fafc">Daniil Kiselyov</text>
  <text x="80" y="255" font-family="Inter, -apple-system, Segoe UI, sans-serif" font-size="28" font-weight="400" fill="#94a3b8">ML / MLOps Engineer · Senior-level ML portfolio</text>
  <text x="80" y="300" font-family="JetBrains Mono, Consolas, monospace" font-size="17" fill="#06b6d4" opacity="0.9">kiselyovd · Python 3.13 · PyTorch Lightning · Hydra · FastAPI · Docker · HF Hub</text>

  <!-- Right side: 4 project icons -->
  <g transform="translate(1100, 120)">
    <!-- M0 template -->
    <g transform="translate(0, 0)">
      <rect width="90" height="90" rx="14" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5"/>
      <g transform="translate(24, 24)" stroke="#06b6d4" stroke-width="2.5" fill="none" stroke-linecap="round">
        <circle cx="21" cy="21" r="12"/>
        <path d="M 21 4 L 21 10 M 21 32 L 21 38 M 4 21 L 10 21 M 32 21 L 38 21"/>
      </g>
      <text x="45" y="108" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">Template</text>
    </g>

    <!-- M1 X-ray -->
    <g transform="translate(120, 0)">
      <rect width="90" height="90" rx="14" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
      <g transform="translate(22, 18)" stroke="#22d3ee" stroke-width="2" fill="none" stroke-linecap="round">
        <path d="M 23 5 C 12 5 6 18 6 30 C 6 42 14 52 23 52 C 32 52 40 42 40 30 C 40 18 34 5 23 5 Z"/>
        <path d="M 18 20 L 18 42 M 28 20 L 28 42 M 13 28 L 33 28 M 13 36 L 33 36" opacity="0.6"/>
      </g>
      <text x="45" y="108" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">Chest X-ray</text>
    </g>

    <!-- M2 brain -->
    <g transform="translate(240, 0)">
      <rect width="90" height="90" rx="14" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
      <g transform="translate(20, 18)" stroke="#a78bfa" stroke-width="2" fill="none" stroke-linecap="round">
        <path d="M 25 8 C 12 8 4 18 4 30 C 4 42 14 52 25 52 C 36 52 46 42 46 30 C 46 18 38 8 25 8 Z"/>
        <path d="M 15 22 C 18 18 22 18 25 22 M 25 22 C 28 18 32 18 35 22 M 12 32 C 16 28 22 32 25 34 C 28 32 34 28 38 32 M 18 42 C 22 40 28 40 32 42" opacity="0.65"/>
      </g>
      <text x="45" y="108" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">Brain MRI</text>
    </g>

    <!-- M3 car -->
    <g transform="translate(360, 0)">
      <rect width="90" height="90" rx="14" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
      <g transform="translate(12, 28)" stroke="#fbbf24" stroke-width="2" fill="none" stroke-linecap="round">
        <path d="M 8 22 L 8 14 L 20 6 L 46 6 L 58 14 L 66 14 L 66 22 Z"/>
        <circle cx="18" cy="22" r="5" fill="#0f172a"/>
        <circle cx="52" cy="22" r="5" fill="#0f172a"/>
      </g>
      <g transform="translate(12, 28)" fill="#fbbf24">
        <circle cx="14" cy="10" r="2"/>
        <circle cx="24" cy="6" r="2"/>
        <circle cx="44" cy="6" r="2"/>
        <circle cx="54" cy="10" r="2"/>
      </g>
      <text x="45" y="108" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">Vehicle keypoints</text>
    </g>
  </g>

  <!-- Bottom chip -->
  <rect x="80" y="340" width="360" height="28" rx="14" fill="none" stroke="#334155" stroke-width="1"/>
  <text x="260" y="359" text-anchor="middle" font-family="JetBrains Mono, Consolas, monospace" font-size="13" fill="#94a3b8">github.com/kiselyovd</text>
</svg>
